# ═══════════════════════════════════════════════════════════════════
#  ENTERPRISE AI AGENT — BUSINESS CONFIGURATION
#  Businesses edit this single file to configure their AI agent.
# ═══════════════════════════════════════════════════════════════════

company:
  name: "Pizza Express"
  industry: "food_delivery"

# ── Agent Personality & LLM ──────────────────────────────────────
agent:
  personality: "Friendly, helpful pizza delivery assistant"
  greeting: "Hi, welcome to Pizza Express! How can I help you today?"
  llm_provider: groq                     # groq | openai | anthropic
  llm_model: "meta-llama/llama-4-scout-17b-16e-instruct"
  stt_model: "whisper-large-v3-turbo"
  tts_model: "playai-tts"
  tts_voice: "Fritz-PlayAI"
  max_voice_results: 5
  confirm_before_write: true

# ── Data Adapters (plug in your databases) ───────────────────────
adapters:
  customers:
    type: json                           # json | sql | mongodb | rest_api
    source: "data/customers.json"
    id_field: "customer_id"
    search_fields: ["name", "email", "phone"]
    display_name: "CRM Customers"
    writable: false

  support_tickets:
    type: json
    source: "data/support_tickets.json"
    id_field: "ticket_id"
    search_fields: ["subject"]
    display_name: "Support Tickets"
    writable: false

  analytics:
    type: json
    source: "data/analytics.json"
    id_field: ""
    search_fields: ["metric"]
    display_name: "Analytics"
    writable: false

  # ── Snowflake Data Source ──────────────────────────────────────
  snowflake_orders:
    type: snowflake
    table: ORDERS
    id_field: ORDER_ID
    search_fields: ["CUSTOMER_NAME", "ORDER_STATUS"]
    display_name: "Snowflake Orders"
    writable: false
    account: "${SNOWFLAKE_ACCOUNT}"
    user: "${SNOWFLAKE_USER}"
    password: "${SNOWFLAKE_PASSWORD}"
    warehouse: "${SNOWFLAKE_WAREHOUSE}"
    database: "${SNOWFLAKE_DATABASE}"
    schema: "${SNOWFLAKE_SCHEMA}"
    role: "${SNOWFLAKE_ROLE}"

# ── Authentication ───────────────────────────────────────────────
auth:
  required: true                         # Require caller verification
  strategy: voice_pin                    # voice_pin | knowledge | otp | none
  max_attempts: 3
  challenges:
    - prompt: "What's the phone number on your account?"
      match_adapter: customers
      match_field: phone
    - prompt: "And what's the email address on your account?"
      match_adapter: customers
      match_field: email
  on_failure: "I wasn't able to verify your identity. Please contact us directly."

# ── Role-Based Access Control ────────────────────────────────────
rbac:
  enabled: true
  roles:
    admin:
      data_sources: ["*"]
      can_see_all_users: true
    manager:
      data_sources: ["customers", "support_tickets", "analytics", "snowflake_orders"]
      can_see_all_users: true
    customer:
      data_sources: ["snowflake_orders", "support_tickets"]
      can_see_all_users: false

# ── Business Rules ───────────────────────────────────────────────
business_rules:
  greeting:
    - condition: "customer.days_since_last_order > 14"
      action: inject_message
      message: "Welcome back! It's been a while. Here's a free cookie with your next order!"
    - condition: "customer.total_orders > 20"
      action: inject_message
      message: "Welcome back, VIP! Great to hear from you again."

  guards:
    - condition: "order.status == 'in_transit'"
      blocks: "update_order"
      message: "Sorry, this order is already on the way and cannot be modified."
    - condition: "order.status == 'delivered'"
      blocks: "update_order"
      message: "This order has already been delivered."

  escalation:
    - condition: "session.auth_attempts >= 3"
      action: escalate
      reason: "Too many failed authentication attempts"
    - condition: "customer.requests_human"
      action: escalate
      reason: "Customer requested human agent"

  # ── Advanced Rules (evaluated by RulesEngine) ──────────────────
  customer_segmentation:
    - name: vip_customer
      condition:
        total_orders: ">20"
        total_spent: ">10000"
      actions:
        customer_tier: "VIP"
        benefits: ["priority_support", "faster_delivery", "exclusive_discounts"]
    - name: frequent_customer
      condition:
        orders_last_30_days: ">=5"
      actions:
        tag: "Frequent Buyer"

  pricing_and_discounts:
    - name: high_value_order_discount
      condition:
        order_value: ">1000"
      actions:
        discount: "10%"
    - name: first_order_offer
      condition:
        total_orders: "==1"
      actions:
        discount: "20% welcome coupon"
    - name: inactive_customer_reactivation
      condition:
        last_order_days: ">30"
      actions:
        offer: "25% comeback discount"

  delivery_and_operations:
    - name: delayed_order_compensation
      condition:
        delivery_time: ">expected_time"
      actions:
        compensation: "free_delivery_next_order"
    - name: real_time_escalation
      condition:
        order_status: "delayed"
        delay_minutes: ">20"
      actions:
        escalate_to_support: true

  cancellation_and_refund:
    - name: late_cancellation
      condition:
        order_status: "preparing"
      actions:
        refund_percentage: 80
    - name: early_cancellation
      condition:
        order_status: "placed"
      actions:
        refund_percentage: 100

  personalization:
    - name: favorite_product_suggestion
      condition:
        most_ordered_item: "exists"
      actions:
        suggest_item: "{{most_ordered_item}}"
    - name: time_based_suggestion
      condition:
        current_time: "evening"
      actions:
        suggest_item: "snacks_or_pizza"

  risk_and_fraud:
    - name: suspicious_activity
      condition:
        multiple_orders_short_time: true
      actions:
        flag: "possible_fraud"
    - name: high_refund_frequency
      condition:
        refunds_last_10_orders: ">5"
      actions:
        restrict_offers: true

  support_automation:
    - name: auto_resolve_order_status
      condition:
        query_type: "order_status"
      actions:
        auto_respond: true
    - name: escalate_angry_customer
      condition:
        sentiment: "negative"
      actions:
        escalate_to_human: true

  loyalty_and_gamification:
    - name: milestone_reward
      condition:
        total_orders: "==10"
      actions:
        reward: "free_item"
    - name: birthday_offer
      condition:
        is_birthday: true
      actions:
        offer: "free_dessert"

  context_aware_ai:
    - name: missing_info
      condition:
        phone_number: "missing"
        order_id: "missing"
      actions:
        ask_user: "Please provide your phone number or order ID"
    - name: smart_tool_trigger
      condition:
        intent: ["order_status", "customer_query"]
      actions:
        use_snowflake: true

# ── Knowledge Base (RAG sources for FAQ/policies) ────────────────
knowledge:
  enabled: false
  sources: []
  # Example:
  # - type: file
  #   path: "./knowledge/faq.md"
  # - type: file
  #   path: "./knowledge/return_policy.pdf"

# ── Escalation / Human Handoff ───────────────────────────────────
escalation:
  enabled: false
  handoff:
    method: webhook                      # webhook | slack | queue
    url: "${ESCALATION_WEBHOOK_URL}"
    include: ["session_summary", "customer_profile", "transcript"]
  message: "Let me connect you with a team member who can help."

# ── Performance ──────────────────────────────────────────────────
performance:
  filler_messages:
    - "Let me look that up for you..."
    - "One moment while I check..."
    - "Give me just a second..."
  filler_timeout_seconds: 1.5
  prefetch_after_auth: true
  cache_ttl_seconds: 300
